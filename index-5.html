function removeBackground(canvas){
  const ctx=canvas.getContext("2d"),d=ctx.getImageData(0,0,canvas.width,canvas.height);
  for(let i=0;i<d.data.length;i+=4)if(d.data[i]>200&&d.data[i+1]>200&&d.data[i+2]>200)d.data[i+3]=0;
  ctx.putImageData(d,0,0);return canvas.toDataURL("image/png");
}

function Toast({msg,err,onDone}){
  React.useEffect(()=>{const t=setTimeout(onDone,2800);return()=>clearTimeout(t);},[]);
  return <div className={`toast ${err?"te":""}`}>{msg}</div>;
}

function exportExcel(list){
  const rows=list.map((c,i)=>({
    "ক্রম":i+1,"রেজিস্ট্রেশন আইডি":c.rid,
    "নাম (বাংলা)":c.nameBn,"Name (English)":c.nameEn,
    "পিতার নাম (বাংলা)":c.fatherBn,"Father Name":c.fatherEn,
    "মাতার নাম (বাংলা)":c.motherBn,"Mother Name":c.motherEn,
    "জন্ম তারিখ":c.dob,"পরিচয়পত্র ধরন":c.idType==="nid"?"NID":"জন্ম নিবন্ধন",
    "পরিচয়পত্র নম্বর":c.idNum,"মোবাইল":c.mobile,"ইমেইল":c.email,
    "শিক্ষাগত যোগ্যতা":c.education,"বিভাগ":c.division,"জেলা":c.district,
    "উপজেলা":c.upazila,"পূর্ণ ঠিকানা":c.address,
    "স্ট্যাটাস":c.status==="approved"?"অনুমোদিত":c.status==="rejected"?"প্রত্যাখ্যাত":"অপেক্ষমাণ",
    "নিবন্ধন তারিখ":c.regDate||""
  }));
  const ws=XLSX.utils.json_to_sheet(rows),wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"প্রার্থী");
  XLSX.writeFile(wb,"candidates_"+new Date().toISOString().slice(0,10)+".xlsx");
}

async function exportZip(list,setP){
  const zip=new JSZip();
  for(let i=0;i<list.length;i++){
    const c=list[i],n=slug(c.nameEn||c.nameBn)+"_"+c.rid,f=zip.folder(n);
    if(c.ph)f.file("photo_300x300.jpg",b64Blob(c.ph,"image/jpeg"));
    if(c.sg)f.file("signature_300x80.png",b64Blob(c.sg,"image/png"));
    if(c.nid)f.file("nid_card.jpg",b64Blob(c.nid,"image/jpeg"));
    if(c.doc)f.file("id_document.jpg",b64Blob(c.doc,"image/jpeg"));
    setP(Math.round(((i+1)/list.length)*80));
  }
  setP(90);
  const blob=await zip.generateAsync({type:"blob"});
  setP(100);
  dlBlob(blob,"images_"+new Date().toISOString().slice(0,10)+".zip");
}

/* STEP 2 */
function Step2({pd,onComplete,onBack}){
  const [nid,setNid]=useState(null),[doc,setDoc]=useState(null),[ph,setPh]=useState(null),[sg,setSg]=useState(null),[proc,setProc]=useState(false);
  const rf=(file,cb)=>{const r=new FileReader();r.onload=e=>cb(e.target.result);r.readAsDataURL(file);};
  const rz=(file,fn,w,h)=>rf(file,src=>{const img=new Image();img.onload=()=>{const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);fn(c.toDataURL("image/jpeg",.92));};img.src=src;});
  const hs=file=>{setProc(true);rf(file,src=>{const img=new Image();img.onload=()=>{const c=document.createElement("canvas");c.width=300;c.height=80;c.getContext("2d").drawImage(img,0,0,300,80);setSg(removeBackground(c));setProc(false);};img.src=src;});};
  const can=nid&&doc&&ph&&sg;
  return <div className="page"><div className="card cwide">
    <div className="ch"><h2>ডকুমেন্ট ও ছবি আপলোড করুন</h2><p>সকল ডকুমেন্ট স্পষ্ট ও পাঠযোগ্য হতে হবে</p></div>
    <div className="steps">{["ব্যক্তিগত তথ্য","ডকুমেন্ট আপলোড","সম্পন্ন"].map((x,i)=><div key={i} className={`si ${i===1?"act":i===0?"dn":""}`}><div className="sn">{i===0?"✓":i===1?"২":"৩"}</div><div className="sl">{x}</div></div>)}</div>
    <div className="cb"><div className="grid">
      <div className="fld full"><label>জাতীয় পরিচয়পত্র (NID কার্ড) — উভয় পৃষ্ঠা <span className="req">*</span></label>
        <div className={`uz ${nid?"ok":""}`}><input type="file" accept="image/*" onChange={e=>e.target.files[0]&&rf(e.target.files[0],setNid)}/>
          {!nid?<><div className="ui">🪪</div><div className="ul">NID কার্ডের ছবি বা স্ক্যান</div><div className="us">যেকোনো সাইজ • JPG, PNG</div></>:<><div className="up"><img src={nid} alt="nid"/></div><span className="ub">✓ আপলোড সম্পন্ন</span></>}
        </div>
      </div>
      <div className="fld full"><label>NID / জন্ম নিবন্ধন সনদ (ডিজিটাল কপি) <span className="req">*</span></label>
        <div className={`uz ${doc?"ok":""}`}><input type="file" accept="image/*,application/pdf" onChange={e=>e.target.files[0]&&rf(e.target.files[0],setDoc)}/>
          {!doc?<><div className="ui">📄</div><div className="ul">NID / জন্ম নিবন্ধন সনদ</div><div className="us">JPG, PNG, PDF গ্রহণযোগ্য</div></>:<><div style={{fontSize:36,marginBottom:4}}>✅</div><span className="ub">✓ ডকুমেন্ট সম্পন্ন</span></>}
        </div>
      </div>
      <div className="fld"><label>প্রার্থীর ছবি (৩০০×৩০০ px) <span className="req">*</span></label>
        <div className={`uz ${ph?"ok":""}`} style={{minHeight:145}}><input type="file" accept="image/*" onChange={e=>e.target.files[0]&&rz(e.target.files[0],setPh,300,300)}/>
          {!ph?<><div className="ui">🖼️</div><div className="ul">পাসপোর্ট সাইজ ছবি</div><div className="us">স্বয়ংক্রিয়ভাবে ৩০০×৩০০ হবে</div></>:<><div className="up"><img src={ph} alt="p" style={{width:75,height:75,borderRadius:4}}/></div><span className="ub">✓ ছবি সম্পন্ন</span></>}
        </div>
      </div>
      <div className="fld"><label>স্বাক্ষর (৩০০×৮০ px) <span className="req">*</span></label>
        <div className={`uz ${sg?"ok":""}`} style={{minHeight:145}}><input type="file" accept="image/*" onChange={e=>e.target.files[0]&&hs(e.target.files[0])} disabled={proc}/>

    </div>
  </div></div>;
}

/* ADMIN PANEL */
function AdminPanel({candidates,setCandidates}){
  const [view,setView]=useState("dash"),[search,setSearch]=useState(""),[fst,setFst]=useState("all");

  const fl=useMemo(()=>candidates.filter(c=>{
    const q=search.toLowerCase();
    return(!q||(c.nameBn||"").includes(q)||(c.nameEn||"").toLowerCase().includes(q)||(c.rid||"").includes(q)||(c.mobile||"").includes(q)||(c.idNum||"").includes(q))&&(fst==="all"||c.status===fst);
  }),[candidates,search,fst]);
  const approve=rid=>setCandidates(p=>p.map(c=>c.rid===rid?{...c,status:"approved"}:c));
  const reject=rid=>setCandidates(p=>p.map(c=>c.rid===rid?{...c,status:"rejected"}:c));
  const del=rid=>{if(window.confirm("এই প্রার্থীকে মুছে ফেলবেন?"))setCandidates(p=>p.filter(c=>c.rid!==rid));};
  const approveAll=()=>{setCandidates(p=>p.map(c=>c.status==="pending"?{...c,status:"approved"}:c));msg("সকল অপেক্ষমাণ প্রার্থী অনুমোদিত!");};
  const hXL=()=>{if(!candidates.length)return msg("কোনো প্রার্থী নেই।",true);exportExcel(fl.length&&fl.length<candidates.length?fl:candidates);msg("Excel ডাউনলোড হচ্ছে...");};
  const hZip=async()=>{
    const list=fl.length&&fl.length<candidates.length?fl:candidates;

    setDlA(true);setDlP(0);
    try{await exportZip(list,setDlP);msg("ZIP ডাউনলোড সম্পন্ন!");}catch{msg("ZIP তৈরিতে সমস্যা।",true);}
    setDlA(false);setDlP(0);
  };
  const sides=[["dash","📊","ড্যাশবোর্ড","all"],["list","👥","সকল প্রার্থী","all"],["approved","✅","অনুমোদিত","approved"],["rejected","❌","প্রত্যাখ্যাত","rejected"],["pending","⏳","অপেক্ষমাণ","pending"]];
  const showList=view!=="dash";

  return <div className="aw">
    {toast&&<Toast msg={toast.m} err={toast.e} onDone={()=>setToast(null)}/>}
    {sel&&<CModal c={sel} onClose={()=>setSel(null)} onApprove={rid=>{approve(rid);msg("অনুমোদন সম্পন্ন!");}} onReject={rid=>{reject(rid);msg("প্রত্যাখ্যাত করা হয়েছে।");}}/>}

      <h3>⚙️ অ্যাডমিন মেনু</h3>
      {sides.map(([v,ic,lb,fs])=><button key={v} className={`asb ${view===v?"on":""}`} onClick={()=>{setView(v);setFst(fs);}}>
        <span className="ic">{ic}</span>{lb}
        <span className="cnt">{v==="dash"?"":v==="list"?st.total:v==="approved"?st.approved:v==="rejected"?st.rejected:st.pending}</span>
      </button>)}
      <div style={{height:1,background:"var(--b)",margin:"13px 0"}}/>
      <div style={{fontSize:11,color:"var(--m)",marginBottom:7,fontWeight:600,padding:"0 3px"}}>⬇ ডাউনলোড</div>
      <button className="asb" style={{color:"var(--ok)"}} onClick={hXL}><span className="ic">📊</span>Excel ডাউনলোড</button>

    </div>

    <div className="amain">
      {!showList&&<>

          <div style={{fontFamily:"'Noto Serif Bengali',serif",fontSize:19,color:"var(--g)",fontWeight:700}}>📊 ড্যাশবোর্ড</div>

        </div>
        <div className="srow">
          {[["মোট প্রার্থী",st.total,"sv-t","👥"],["অপেক্ষমাণ",st.pending,"sv-p","⏳"],["অনুমোদিত",st.approved,"sv-o","✅"],["প্রত্যাখ্যাত",st.rejected,"sv-r","❌"]].map(([l,v,c,i])=><div key={l} className="sc2"><div className={`sv ${c}`}>{i} {v}</div><div className="sl2">{l}</div></div>)}

        <div className="tw">

            <h3>{view==="list"?"সকল প্রার্থী":view==="approved"?"✅ অনুমোদিত":view==="rejected"?"❌ প্রত্যাখ্যাত":"⏳ অপেক্ষমাণ"} ({fl.length})</h3>

/* ROOT */
function App(){
  const [sc,setSc]=useState("login"),[user,setUser]=useState(null),[s1,setS1]=useState(null),[data,setData]=useState(null),[rid,setRid]=useState(null),[candidates,setCandidates]=useState([]);
  const logout=()=>{setSc("login");setUser(null);setData(null);setRid(null);setS1(null);};
  const alogout=()=>{setSc("login");setUser(null);};
  const completeReg=all=>{
    const newRid="BD-"+Math.floor(100000+Math.random()*900000);
    const regDate=new Date().toLocaleDateString("bn-BD");
    setCandidates(p=>[...p,{...all,rid:newRid,status:"pending",regDate,user}]);
    setData(all);setRid(newRid);setSc("success");
  };
  const isA=sc==="admin",isD=sc==="dashboard";
  return <>
    <style>{CSS}</style>
    <div className="app">
      <div className="hdr">
        <div className="hlogo">প</div>
        <div className="htitle"><h1>প্রার্থী নিবন্ধন পোর্টাল</h1><p>Candidate Registration Portal</p></div>
        <div className="hright">
          {isA&&<><span className="abadge">⚙️ অ্যাডমিন</span><button className="logbtn" onClick={alogout}>লগআউট</button></>}
          {isD&&<><span className="hbadge">👤 {user}</span><button className="logbtn" onClick={logout}>লগআউট</button></>}
          {!isA&&!isD&&user&&<span className="hbadge">👤 {user}</span>}
        </div>
      </div>
      {sc==="login"&&<Login onLogin={u=>{setUser(u);setSc("reg1");}} onAdmin={()=>setSc("adminLogin")}/>}
      {sc==="adminLogin"&&<AdminLogin onOk={()=>{setUser("admin");setSc("admin");}} onBack={()=>setSc("login")}/>}
      {sc==="reg1"&&<Step1 onNext={d=>{setS1(d);setSc("reg2");}}/>}
      {sc==="reg2"&&<Step2 pd={s1} onComplete={completeReg} onBack={()=>setSc("reg1")}/>}
      {sc==="success"&&<Success regId={rid} onDash={()=>setSc("dashboard")}/>}
      {sc==="dashboard"&&<CandidateDash user={user} rid={rid} data={data}/>}
      {sc==="admin"&&<AdminPanel candidates={candidates} setCandidates={setCandidates}/>}
    </div>
  </>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
