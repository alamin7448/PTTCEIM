<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>প্রার্থী নিবন্ধন পোর্টাল</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;700&family=Noto+Sans+Bengali:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d1117;--s:#161b22;--s2:#1c2333;--b:#30363d;
  --a:#1a8f5f;--a2:#0ea97a;--g:#d4a843;--t:#e6edf3;
  --m:#8b949e;--d:#f85149;--ok:#3fb950;--w:#e3b341;--inf:#58a6ff;--r:12px;
}
body{font-family:'Noto Sans Bengali',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;}
.app{min-height:100vh;display:flex;flex-direction:column;}
.hdr{background:linear-gradient(135deg,#0d2818,#0a1f30);border-bottom:1px solid var(--a);padding:11px 22px;display:flex;align-items:center;gap:14px;box-shadow:0 4px 20px rgba(26,143,95,.15);position:sticky;top:0;z-index:200;}
.hlogo{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--a),var(--g));display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:700;color:#fff;flex-shrink:0;}
.htitle h1{font-family:'Noto Serif Bengali',serif;font-size:15px;font-weight:700;color:var(--g);}
.htitle p{font-size:11px;color:var(--m);}
.hright{margin-left:auto;display:flex;align-items:center;gap:9px;}
.hbadge{background:rgba(26,143,95,.15);border:1px solid var(--a);color:var(--a2);padding:4px 11px;border-radius:20px;font-size:12px;}
.abadge{background:rgba(212,168,67,.15);border:1px solid var(--g);color:var(--g);padding:4px 11px;border-radius:20px;font-size:12px;}
.logbtn{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:var(--d);padding:4px 11px;border-radius:20px;font-size:12px;cursor:pointer;}
.logbtn:hover{background:rgba(248,81,73,.2);}
.page{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:30px 14px;background:radial-gradient(ellipse at 20% 50%,rgba(26,143,95,.06),transparent 60%);}
.card{background:var(--s);border:1px solid var(--b);border-radius:var(--r);width:100%;max-width:500px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.4);}
.cwide{max-width:750px;}
.ch{background:linear-gradient(135deg,#0d2818,#0a1f30);padding:20px 26px;border-bottom:1px solid rgba(26,143,95,.3);}
.ch h2{font-family:'Noto Serif Bengali',serif;font-size:18px;font-weight:700;color:var(--g);}
.ch p{font-size:12px;color:var(--m);margin-top:3px;}
.cb{padding:24px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.full{grid-column:1/-1;}
@media(max-width:580px){.grid{grid-template-columns:1fr;}.full{grid-column:1;}}
.fld{display:flex;flex-direction:column;gap:5px;}
.fld label{font-size:12px;font-weight:500;color:var(--m);display:flex;align-items:center;gap:4px;}
.req{color:var(--d);font-size:11px;}
.fld input,.fld select,.fld textarea{background:var(--s2);border:1px solid var(--b);border-radius:8px;color:var(--t);font-family:'Noto Sans Bengali',sans-serif;font-size:13px;padding:9px 12px;transition:border-color .2s;outline:none;width:100%;}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--a2);box-shadow:0 0 0 3px rgba(14,169,122,.12);}
.fld select option{background:var(--s2);}
.fld textarea{resize:vertical;min-height:74px;}
.rg{display:flex;gap:9px;flex-wrap:wrap;}
.rl{display:flex;align-items:center;gap:5px;background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:7px 12px;cursor:pointer;font-size:12px;color:var(--m);transition:all .2s;user-select:none;}
.rl.on{border-color:var(--a2);color:var(--a2);background:rgba(14,169,122,.08);}
.btn{border:none;border-radius:8px;cursor:pointer;font-family:'Noto Sans Bengali',sans-serif;font-size:13px;font-weight:600;padding:9px 18px;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
.bp{background:linear-gradient(135deg,var(--a),var(--a2));color:#fff;box-shadow:0 4px 14px rgba(26,143,95,.3);}
.bp:hover{transform:translateY(-1px);}
.bs{background:var(--s2);border:1px solid var(--b);color:var(--m);}
.bs:hover{border-color:var(--a);color:var(--a2);}
.bg{background:rgba(212,168,67,.12);border:1px solid rgba(212,168,67,.4);color:var(--g);}
.bg:hover{background:rgba(212,168,67,.2);}
.br{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:var(--d);}
.br:hover{background:rgba(248,81,73,.2);}
.bok{background:rgba(63,185,80,.12);border:1px solid rgba(63,185,80,.4);color:var(--ok);}
.bok:hover{background:rgba(63,185,80,.2);}
.bi{background:rgba(88,166,255,.1);border:1px solid rgba(88,166,255,.3);color:var(--inf);}
.bi:hover{background:rgba(88,166,255,.2);}
.bfull{width:100%;}
.brow{display:flex;gap:9px;margin-top:6px;}
.brow .bp{flex:1;}
.steps{display:flex;padding:0 26px;background:var(--s);border-bottom:1px solid var(--b);}
.si{flex:1;display:flex;flex-direction:column;align-items:center;padding:12px 6px;position:relative;}
.si:not(:last-child)::after{content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);width:1px;height:26px;background:var(--b);}
.sn{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid var(--b);color:var(--m);background:var(--s2);}
.si.act .sn{border-color:var(--a2);color:var(--a2);background:rgba(14,169,122,.1);}
.si.dn .sn{border-color:var(--ok);background:var(--ok);color:#fff;}
.sl{font-size:10px;color:var(--m);margin-top:3px;text-align:center;}
.si.act .sl{color:var(--a2);}.si.dn .sl{color:var(--ok);}
.uz{border:2px dashed var(--b);border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.uz:hover{border-color:var(--a2);background:rgba(14,169,122,.03);}
.uz.ok{border-color:var(--ok);background:rgba(63,185,80,.03);}
.uz input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.ui{font-size:24px;margin-bottom:4px;}.ul{font-size:12px;color:var(--m);}.us{font-size:11px;color:var(--m);margin-top:2px;}
.up{margin-top:7px;display:flex;align-items:center;justify-content:center;}
.up img{max-height:85px;object-fit:contain;border-radius:5px;}
.ub{display:inline-block;margin-top:5px;background:rgba(63,185,80,.15);border:1px solid var(--ok);color:var(--ok);border-radius:20px;padding:2px 9px;font-size:11px;}
.dash{flex:1;padding:20px;max-width:920px;width:100%;margin:0 auto;}
.dw{background:linear-gradient(135deg,#0d2818,#0a1f30);border:1px solid rgba(26,143,95,.3);border-radius:var(--r);padding:20px 24px;margin-bottom:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.av{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--a),var(--g));display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden;}
.av img{width:100%;height:100%;object-fit:cover;}
.wt h3{font-family:'Noto Serif Bengali',serif;font-size:18px;color:var(--g);font-weight:700;}
.wt p{font-size:12px;color:var(--m);margin-top:2px;}
.wb{margin-left:auto;background:rgba(63,185,80,.12);border:1px solid var(--ok);color:var(--ok);border-radius:20px;padding:5px 13px;font-size:12px;}
.ntabs{display:flex;gap:3px;background:var(--s2);border:1px solid var(--b);border-radius:10px;padding:3px;margin-bottom:20px;}
.ntab{flex:1;padding:8px;border-radius:7px;border:none;background:none;color:var(--m);font-family:'Noto Sans Bengali',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px;}
.ntab.on{background:linear-gradient(135deg,var(--a),var(--a2));color:#fff;box-shadow:0 2px 8px rgba(26,143,95,.3);}
.pg{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
@media(max-width:580px){.pg{grid-template-columns:1fr;}}
.pi{background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:10px 13px;}
.pil{font-size:11px;color:var(--m);margin-bottom:3px;}.piv{font-size:13px;color:var(--t);font-weight:500;}
.pph{display:flex;gap:9px;margin-top:13px;flex-wrap:wrap;}
.pb{background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:9px;text-align:center;flex:1;min-width:115px;}
.pbl{font-size:11px;color:var(--m);margin-bottom:6px;}.pb img{max-height:72px;object-fit:contain;border-radius:4px;}
.pbe{height:52px;display:flex;align-items:center;justify-content:center;color:var(--m);font-size:20px;}
.tp{animation:fi .3s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.st{font-family:'Noto Serif Bengali',serif;font-size:14px;color:var(--g);font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:7px;}
.st::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--b),transparent);}
.oc{background:var(--s2);border:1px solid var(--b);border-radius:10px;padding:16px;margin-bottom:9px;display:flex;align-items:center;gap:13px;flex-wrap:wrap;}
.oi{flex:1;}.oi h4{font-size:13px;font-weight:600;color:var(--t);}.oi p{font-size:11px;color:var(--m);margin-top:2px;}
.ob{background:rgba(26,143,95,.12);border:1px solid var(--a);color:var(--a2);border-radius:7px;padding:6px 13px;font-family:'Noto Sans Bengali',sans-serif;font-size:11px;font-weight:600;cursor:pointer;}
.sc{display:flex;flex-direction:column;gap:8px;}
.sci{background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.sd{width:50px;height:50px;border-radius:8px;background:linear-gradient(135deg,var(--a),var(--a2));display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;}
.sdy{font-size:16px;font-weight:700;color:#fff;line-height:1;}.smn{font-size:9px;color:rgba(255,255,255,.7);margin-top:1px;}
.sif{flex:1;}.sit{font-size:13px;font-weight:600;color:var(--t);}.stm{font-size:11px;color:var(--m);margin-top:2px;}
.sbg{background:rgba(212,168,67,.12);border:1px solid rgba(212,168,67,.4);color:var(--g);border-radius:6px;padding:2px 9px;font-size:11px;}
.ll{width:66px;height:66px;border-radius:50%;background:linear-gradient(135deg,var(--a),var(--g));display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:#fff;margin:0 auto 13px;box-shadow:0 4px 18px rgba(26,143,95,.3);}
.lt{text-align:center;font-family:'Noto Serif Bengali',serif;font-size:20px;color:var(--g);font-weight:700;margin-bottom:4px;}
.ls{text-align:center;font-size:12px;color:var(--m);margin-bottom:20px;}
.dv{height:1px;background:var(--b);margin:16px 0;position:relative;text-align:center;}
.dv span{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--s);padding:0 9px;color:var(--m);font-size:11px;}
.sic{font-size:58px;text-align:center;margin-bottom:13px;animation:pp .5s cubic-bezier(.68,-.55,.27,1.55);}
@keyframes pp{from{transform:scale(0);}to{transform:scale(1);}}
.stitle{text-align:center;font-family:'Noto Serif Bengali',serif;font-size:20px;color:var(--ok);font-weight:700;margin-bottom:6px;}
.ssub{text-align:center;font-size:13px;color:var(--m);}
.rid{background:var(--s2);border:1px solid var(--a);border-radius:8px;padding:12px;text-align:center;margin:13px 0;}
.ridl{font-size:11px;color:var(--m);margin-bottom:3px;}.ridv{font-size:20px;font-weight:700;color:var(--g);letter-spacing:2px;}
/* ADMIN */
.aw{flex:1;display:flex;min-height:0;}
.aside{width:210px;background:var(--s);border-right:1px solid var(--b);padding:14px;flex-shrink:0;}
.aside h3{font-family:'Noto Serif Bengali',serif;font-size:12px;color:var(--g);margin-bottom:11px;padding-bottom:9px;border-bottom:1px solid var(--b);}
.asb{display:flex;align-items:center;gap:7px;padding:8px 11px;border-radius:8px;cursor:pointer;font-size:12px;color:var(--m);margin-bottom:3px;transition:all .2s;border:none;background:none;width:100%;text-align:left;font-family:'Noto Sans Bengali',sans-serif;}
.asb:hover{background:var(--s2);color:var(--t);}
.asb.on{background:rgba(26,143,95,.12);color:var(--a2);border:1px solid rgba(26,143,95,.2);}
.cnt{margin-left:auto;background:var(--s2);border-radius:10px;padding:1px 7px;font-size:10px;color:var(--m);}
.amain{flex:1;padding:22px;overflow-y:auto;}
.srow{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:20px;}
@media(max-width:680px){.srow{grid-template-columns:1fr 1fr;}}
.sc2{background:var(--s);border:1px solid var(--b);border-radius:10px;padding:14px;text-align:center;}
.sv{font-size:26px;font-weight:700;margin-bottom:3px;}
.sv2{font-size:11px;color:var(--m);}
.sv-t{color:var(--inf);}.sv-p{color:var(--w);}.sv-o{color:var(--ok);}.sv-r{color:var(--d);}
.tw{background:var(--s);border:1px solid var(--b);border-radius:10px;overflow:hidden;}
.tt{padding:13px 15px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
.tt h3{font-family:'Noto Serif Bengali',serif;font-size:14px;color:var(--g);font-weight:700;flex:1;}
.sb{background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:6px 11px;color:var(--t);font-family:'Noto Sans Bengali',sans-serif;font-size:12px;outline:none;width:190px;}
.sb:focus{border-color:var(--a2);}
.ta{display:flex;gap:7px;flex-wrap:wrap;}
table{width:100%;border-collapse:collapse;}
thead th{background:var(--s2);padding:9px 13px;font-size:11px;color:var(--m);font-weight:600;text-align:left;border-bottom:1px solid var(--b);}
tbody tr{border-bottom:1px solid rgba(48,54,61,.4);transition:background .15s;}
tbody tr:hover{background:rgba(28,35,51,.5);}
tbody td{padding:9px 13px;font-size:12px;color:var(--t);}
tbody tr:last-child{border-bottom:none;}
.tda{display:flex;gap:5px;flex-wrap:wrap;}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;}
.bp2{background:rgba(227,179,65,.12);border:1px solid rgba(227,179,65,.4);color:var(--w);}
.bo{background:rgba(63,185,80,.12);border:1px solid rgba(63,185,80,.4);color:var(--ok);}
.be{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:var(--d);}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:999;display:flex;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(4px);}
.modal{background:var(--s);border:1px solid var(--b);border-radius:var(--r);width:100%;max-width:660px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.6);}
.mh{padding:16px 20px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--s);z-index:1;}
.mh h3{font-family:'Noto Serif Bengali',serif;font-size:16px;color:var(--g);font-weight:700;}
.mc{background:none;border:none;color:var(--m);font-size:20px;cursor:pointer;padding:3px;}
.mc:hover{color:var(--d);}
.mb{padding:20px;}
.mphoto{display:flex;gap:9px;flex-wrap:wrap;margin-top:13px;}
.mpb{background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:9px;text-align:center;flex:1;min-width:115px;}
.mpl{font-size:11px;color:var(--m);margin-bottom:5px;}.mpb img{max-height:75px;object-fit:contain;border-radius:4px;}
.dlb{background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:13px 15px;margin-bottom:13px;}
.dlbl{font-size:12px;color:var(--m);margin-bottom:7px;}
.dlbt{height:5px;background:var(--b);border-radius:3px;overflow:hidden;}
.dlbf{height:100%;background:linear-gradient(90deg,var(--a),var(--a2));border-radius:3px;transition:width .3s;}
.toast{position:fixed;bottom:22px;right:22px;z-index:9999;background:var(--s);border:1px solid var(--ok);color:var(--ok);padding:11px 18px;border-radius:10px;font-size:12px;box-shadow:0 4px 18px rgba(0,0,0,.4);animation:su .3s ease;}
@keyframes su{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.te{border-color:var(--d);color:var(--d);}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--b);border-radius:3px;}
</style>
</head>

<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#8b949e;font-family:sans-serif;">লোড হচ্ছে...</div></div>

<script>
// ── DATA ──────────────────────────────────────────────────
var DIVISIONS=["ঢাকা","চট্টগ্রাম","রাজশাহী","খুলনা","বরিশাল","সিলেট","রংপুর","ময়মনসিংহ"];

async function exportZip(list,setP){

  for(var i=0;i<list.length;i++){
    var c=list[i],n=slug(c.nameEn||c.nameBn)+"_"+c.rid,f=zip.folder(n);

          h("div",{className:"tt"},h("h3",null,"সাম্প্রতিক নিবন্ধন")),
          !candidates.length?h("div",{style:{textAlign:"center",padding:36,color:"var(--m)"}},"কোনো প্রার্থী নেই।"):
          h("table",null,
            h("thead",null,h("tr",null,h("th",null,"নাম"),h("th",null,"মোবাইল"),h("th",null,"শিক্ষা"),h("th",null,"স্ট্যাটাস"),h("th",null,"অ্যাকশন"))),
            h("tbody",null,[].concat(candidates).reverse().slice(0,8).map(function(c){
              return h("tr",{key:c.rid},
                h("td",null,h("div",{style:{fontWeight:600,fontSize:13}},c.nameBn),h("div",{style:{fontSize:10,color:"var(--m)"}},c.rid)),
                h("td",null,c.mobile),h("td",null,c.education),h("td",null,statusBadge(c.status)),
                h("td",null,h("button",{className:"btn bi",style:{padding:"3px 9px",fontSize:11},onClick:function(){setSel(c);}},"👁 দেখুন"))
              );
            }))
          )
        )
      ),
      showList&&h("div",null,
        dlA&&h("div",{className:"dlb"},h("div",{className:"dlbl"},"ZIP তৈরি হচ্ছে... "+dlP+"%"),h("div",{className:"dlbt"},h("div",{className:"dlbf",style:{width:dlP+"%"}}))),
        h("div",{className:"tw"},
          h("div",{className:"tt"},
            h("h3",null,(view==="list"?"সকল প্রার্থী":view==="approved"?"✅ অনুমোদিত":view==="rejected"?"❌ প্রত্যাখ্যাত":"⏳ অপেক্ষমাণ")+" ("+fl.length+")"),
            h("input",{className:"sb",placeholder:"🔍 নাম, আইডি, মোবাইল...",value:search,onChange:function(e){setSearch(e.target.value);}}),
            h("div",{className:"ta"},
              h("button",{className:"btn bok",style:{padding:"5px 11px",fontSize:11},onClick:hXL},"📊 Excel"),
              h("button",{className:"btn bi",style:{padding:"5px 11px",fontSize:11},disabled:dlA,onClick:hZip},dlA?"⏳":"🗜️ ZIP"),
              view==="pending"&&h("button",{className:"btn bg",style:{padding:"5px 11px",fontSize:11},disabled:!stats.pending,onClick:approveAll},"⚡ সব অনুমোদন")
            )
          ),
          !fl.length?h("div",{style:{textAlign:"center",padding:34,color:"var(--m)"}},"কোনো প্রার্থী পাওয়া যায়নি।"):
          h("div",{style:{overflowX:"auto"}},
            h("table",null,
              h("thead",null,h("tr",null,["#","নাম","পিতার নাম","মোবাইল","শিক্ষা","জেলা","স্ট্যাটাস","অ্যাকশন"].map(function(x){return h("th",{key:x},x);}))),
              h("tbody",null,fl.map(function(c,i){
                return h("tr",{key:c.rid},
                  h("td",{style:{color:"var(--m)",fontSize:11}},i+1),
                  h("td",null,
                    h("div",{style:{display:"flex",alignItems:"center",gap:7}},
                      c.ph?h("img",{src:c.ph,style:{width:28,height:28,borderRadius:"50%",objectFit:"cover"},alt:""}):h("div",{style:{width:28,height:28,borderRadius:"50%",background:"linear-gradient(135deg,var(--a),var(--g))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",fontWeight:700,flexShrink:0}},(c.nameBn||"?").charAt(0)),
                      h("div",null,h("div",{style:{fontWeight:600,fontSize:13}},c.nameBn),h("div",{style:{fontSize:10,color:"var(--m)"}},c.rid))
                    )
                  ),
                  h("td",{style:{fontSize:12}},c.fatherBn||"—"),
                  h("td",{style:{fontSize:12}},c.mobile),
                  h("td",{style:{fontSize:12}},c.education),
                  h("td",{style:{fontSize:12}},c.district),
                  h("td",null,statusBadge(c.status)),
                  h("td",null,
                    h("div",{className:"tda"},
                      h("button",{className:"btn bi",style:{padding:"3px 8px",fontSize:11},onClick:function(){setSel(c);}},"👁"),
                      c.status!=="approved"&&h("button",{className:"btn bok",style:{padding:"3px 8px",fontSize:11},title:"অনুমোদন",onClick:function(){approve(c.rid);msg("অনুমোদন সম্পন্ন!");}}, "✓"),
                      c.status!=="rejected"&&h("button",{className:"btn br",style:{padding:"3px 8px",fontSize:11},title:"প্রত্যাখ্যান",onClick:function(){reject(c.rid);msg("প্রত্যাখ্যাত হয়েছে.");}},"✕"),
                      h("button",{className:"btn br",style:{padding:"3px 8px",fontSize:11},title:"মুছুন",onClick:function(){del(c.rid);}},"🗑")
                    )
                  )
                );
              }))
            )
          )
        )
      )
    )
  );
}

// ── ROOT APP ──────────────────────────────────────────────
function App(){
  var ssc=useState("login"),sc=ssc[0],setSc=ssc[1];
  var su=useState(null),user=su[0],setUser=su[1];
  var ss1=useState(null),s1=ss1[0],setS1=ss1[1];
  var sdata=useState(null),data=sdata[0],setData=sdata[1];
  var srid=useState(null),rid=srid[0],setRid=srid[1];
  var scand=useState([]),candidates=scand[0],setCandidates=scand[1];

  function logout(){setSc("login");setUser(null);setData(null);setRid(null);setS1(null);}
  function alogout(){setSc("login");setUser(null);}

  function completeReg(all){
    var newRid="BD-"+Math.floor(100000+Math.random()*900000);
    var regDate=new Date().toLocaleDateString("bn-BD");
    setCandidates(function(p){return p.concat([Object.assign({},all,{rid:newRid,status:"pending",regDate:regDate,user:user})]);});
    setData(all);setRid(newRid);setSc("success");
  }

  var isA=sc==="admin",isD=sc==="dashboard";
  return h("div",{className:"app"},
    h("div",{className:"hdr"},
      h("div",{className:"hlogo"},"প"),
      h("div",{className:"htitle"},h("h1",null,"প্রার্থী নিবন্ধন পোর্টাল"),h("p",null,"Candidate Registration Portal")),
      h("div",{className:"hright"},
        isA&&h("span",{className:"abadge"},"⚙️ অ্যাডমিন"),
        isA&&h("button",{className:"logbtn",onClick:alogout},"লগআউট"),
        isD&&h("span",{className:"hbadge"},"👤 "+user),
        isD&&h("button",{className:"logbtn",onClick:logout},"লগআউট"),
        !isA&&!isD&&user&&h("span",{className:"hbadge"},"👤 "+user)
      )
    ),
    sc==="login"&&h(Login,{onLogin:function(u){setUser(u);setSc("reg1");},onAdmin:function(){setSc("adminLogin");}}),
    sc==="adminLogin"&&h(AdminLogin,{onOk:function(){setUser("admin");setSc("admin");},onBack:function(){setSc("login");}}),
    sc==="reg1"&&h(Step1,{onNext:function(d){setS1(d);setSc("reg2");}}),
    sc==="reg2"&&h(Step2,{pd:s1,onComplete:completeReg,onBack:function(){setSc("reg1");}}),
    sc==="success"&&h(Success,{regId:rid,onDash:function(){setSc("dashboard");}}),
    sc==="dashboard"&&h(CandidateDash,{user:user,rid:rid,data:data}),
    sc==="admin"&&h(AdminPanel,{candidates:candidates,setCandidates:setCandidates})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
</body>
</html>
