function removeBackground(canvas) {
  const ctx = canvas.getContext("2d");
  const d = ctx.getImageData(0,0,canvas.width,canvas.height);
  for(let i=0;i<d.data.length;i+=4)
    if(d.data[i]>200&&d.data[i+1]>200&&d.data[i+2]>200) d.data[i+3]=0;
  ctx.putImageData(d,0,0);
  return canvas.toDataURL("image/png");
}

function Login({onLogin}) {
  const [u,setU]=useState(""); const [p,setP]=useState(""); const [e,setE]=useState("");
  const go=()=>{if(!u||!p)return setE("ইউজার নাম ও পাসওয়ার্ড দিন।");setE("");onLogin(u);};
  return <div className="page"><div className="card" style={{maxWidth:420}}><div className="card-body">
    <div className="ll">প</div>
    <h2 className="lt">প্রার্থী পোর্টাল</h2>
    <p className="ls">আপনার অ্যাকাউন্টে প্রবেশ করুন</p>
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div className="fld"><label>ইউজার নাম <span className="req">*</span></label><input placeholder="ইউজার নাম" value={u} onChange={e=>setU(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} /></div>
      <div className="fld"><label>পাসওয়ার্ড <span className="req">*</span></label><input type="password" placeholder="পাসওয়ার্ড" value={p} onChange={e=>setP(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} /></div>
      {e&&<p style={{color:"var(--d)",fontSize:13}}>{e}</p>}
      <button className="btn btn-p" onClick={go}>প্রবেশ করুন →</button>
    </div>
    <div className="dv"><span>নতুন প্রার্থী?</span></div>
    <p style={{textAlign:"center",fontSize:13,color:"var(--m)"}}>লগইনের পরে <strong style={{color:"var(--a2)"}}>স্বয়ংক্রিয় রেজিস্ট্রেশন</strong> শুরু হবে।</p>
  </div></div></div>;
}

function Step1({onNext}) {

  const s=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  const ds=DISTRICTS[f.division]||[];
  const ok=["nameBn","nameEn","fatherBn","fatherEn","motherBn","motherEn","dob","idNum","mobile","education","email","division","district","upazila","address"].every(k=>f[k].trim());
  return <div className="page"><div className="card card-wide">

    <div className="steps">{["ব্যক্তিগত তথ্য","ডকুমেন্ট আপলোড","সম্পন্ন"].map((x,i)=><div key={i} className={`si ${i===0?"act":""}`}><div className="sn">{i===0?"১":i===1?"২":"✓"}</div><div className="sl">{x}</div></div>)}</div>

      <div className="fld"><label>Name (English) <span className="req">*</span></label><input placeholder="Name in English" value={f.nameEn} onChange={s("nameEn")} /></div>
      <div className="fld"><label>পিতার নাম (বাংলা) <span className="req">*</span></label><input placeholder="পিতার নাম" value={f.fatherBn} onChange={s("fatherBn")} /></div>
      <div className="fld"><label>Father's Name (English) <span className="req">*</span></label><input placeholder="Father's name" value={f.fatherEn} onChange={s("fatherEn")} /></div>
      <div className="fld"><label>মাতার নাম (বাংলা) <span className="req">*</span></label><input placeholder="মাতার নাম" value={f.motherBn} onChange={s("motherBn")} /></div>
      <div className="fld"><label>Mother's Name (English) <span className="req">*</span></label><input placeholder="Mother's name" value={f.motherEn} onChange={s("motherEn")} /></div>

      <div className="fld"><label>পরিচয়পত্রের ধরন <span className="req">*</span></label>
        <div className="rg">{[["nid","NID"],["birth","জন্ম নিবন্ধন"]].map(([v,l])=><label key={v} className={`rl ${f.idType===v?"on":""}`} onClick={()=>setF(p=>({...p,idType:v}))}><input type="radio" name="idt" />{l}</label>)}</div>
      </div>
      <div className="fld full"><label>{f.idType==="nid"?"NID নম্বর":"জন্ম নিবন্ধন নম্বর"} <span className="req">*</span></label><input placeholder={f.idType==="nid"?"১৭ সংখ্যার NID":"জন্ম নিবন্ধন নম্বর"} value={f.idNum} onChange={s("idNum")} /></div>
      <div className="fld"><label>মোবাইল নম্বর <span className="req">*</span></label><input placeholder="01XXXXXXXXX" value={f.mobile} onChange={s("mobile")} /></div>
      <div className="fld"><label>শিক্ষাগত যোগ্যতা <span className="req">*</span></label><select value={f.education} onChange={s("education")}><option value="">নির্বাচন করুন</option>{EDUCATIONS.map(e=><option key={e} value={e}>{e}</option>)}</select></div>
      <div className="fld full"><label>ইমেইল <span className="req">*</span></label><input type="email" placeholder="example@email.com" value={f.email} onChange={s("email")} /></div>
      <div className="fld"><label>বিভাগ <span className="req">*</span></label><select value={f.division} onChange={e=>setF(p=>({...p,division:e.target.value,district:"",upazila:""}))}><option value="">বিভাগ নির্বাচন করুন</option>{DIVISIONS.map(d=><option key={d} value={d}>{d}</option>)}</select></div>
      <div className="fld"><label>জেলা <span className="req">*</span></label><select value={f.district} onChange={s("district")} disabled={!f.division}><option value="">জেলা নির্বাচন করুন</option>{ds.map(d=><option key={d} value={d}>{d}</option>)}</select></div>
      <div className="fld"><label>উপজেলা <span className="req">*</span></label><select value={f.upazila} onChange={s("upazila")} disabled={!f.district}><option value="">উপজেলা নির্বাচন করুন</option>{UPAZILAS.map(u=><option key={u} value={u}>{u}</option>)}</select></div>
      <div className="fld full"><label>পূর্ণ ঠিকানা <span className="req">*</span></label><textarea placeholder="গ্রাম/মহল্লা, ডাকঘর, থানা সহ পূর্ণ ঠিকানা লিখুন" value={f.address} onChange={s("address")} /></div>
    </div>
    <div style={{marginTop:20}}>
      <button className="btn btn-p" onClick={()=>ok&&onNext(f)} style={{opacity:ok?1:.6}}>পরবর্তী ধাপ: ডকুমেন্ট আপলোড →</button>
      {!ok&&<p style={{color:"var(--d)",fontSize:12,marginTop:8,textAlign:"center"}}>সকল তথ্য পূরণ করুন</p>}
    </div></div>
  </div></div>;
}

function Step2({pd,onComplete,onBack}) {
  const [nid,setNid]=useState(null);const [doc,setDoc]=useState(null);
  const [ph,setPh]=useState(null);const [sg,setSg]=useState(null);const [proc,setProc]=useState(false);
  const rf=(file,cb)=>{const r=new FileReader();r.onload=e=>cb(e.target.result);r.readAsDataURL(file);};
  const rz=(file,fn,w,h)=>rf(file,src=>{const img=new Image();img.onload=()=>{const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);fn(c.toDataURL("image/jpeg",.92));};img.src=src;});
  const hs=file=>{setProc(true);rf(file,src=>{const img=new Image();img.onload=()=>{const c=document.createElement("canvas");c.width=300;c.height=80;c.getContext("2d").drawImage(img,0,0,300,80);setSg(removeBackground(c));setProc(false);};img.src=src;});};
  const can=nid&&doc&&ph&&sg;
  return <div className="page"><div className="card card-wide">
    <div className="card-hdr"><h2>ডকুমেন্ট ও ছবি আপলোড করুন</h2><p>সকল ডকুমেন্ট স্পষ্ট ও পাঠযোগ্য হতে হবে</p></div>
    <div className="steps">{["ব্যক্তিগত তথ্য","ডকুমেন্ট আপলোড","সম্পন্ন"].map((x,i)=><div key={i} className={`si ${i===1?"act":i===0?"dn":""}`}><div className="sn">{i===0?"✓":i===1?"২":"৩"}</div><div className="sl">{x}</div></div>)}</div>
    <div className="card-body"><div className="grid">
      <div className="fld full"><label>জাতীয় পরিচয়পত্র (NID কার্ড) <span className="req">*</span></label>
        <div className={`uz ${nid?"ok":""}`}><input type="file" accept="image/*" onChange={e=>e.target.files[0]&&rf(e.target.files[0],setNid)} />
          {!nid?<><div className="ui">🪪</div><div className="ul">NID কার্ডের ছবি/স্ক্যান</div><div className="us">যেকোনো সাইজ • JPG, PNG</div></>:<><div className="up"><img src={nid} alt="nid"/></div><span className="ub">✓ আপলোড সম্পন্ন</span></>}
        </div>
      </div>
      <div className="fld full"><label>NID / জন্ম নিবন্ধন সনদ (ডিজিটাল কপি) <span className="req">*</span></label>
        <div className={`uz ${doc?"ok":""}`}><input type="file" accept="image/*,application/pdf" onChange={e=>e.target.files[0]&&rf(e.target.files[0],setDoc)} />
          {!doc?<><div className="ui">📄</div><div className="ul">NID / জন্ম নিবন্ধন আপলোড</div><div className="us">JPG, PNG, PDF গ্রহণযোগ্য</div></>:<><div style={{fontSize:40,marginBottom:6}}>✅</div><span className="ub">✓ ডকুমেন্ট সম্পন্ন</span></>}
        </div>
      </div>
      <div className="fld"><label>প্রার্থীর ছবি (৩০০×৩০০ px) <span className="req">*</span></label>
        <div className={`uz ${ph?"ok":""}`} style={{minHeight:160}}><input type="file" accept="image/*" onChange={e=>e.target.files[0]&&rz(e.target.files[0],setPh,300,300)} />
          {!ph?<><div className="ui">🖼️</div><div className="ul">পাসপোর্ট সাইজ ছবি</div><div className="us">স্বয়ংক্রিয়ভাবে ৩০০×৩০০ হবে</div></>:<><div className="up"><img src={ph} alt="p" style={{width:80,height:80,borderRadius:4}}/></div><span className="ub">✓ ছবি সম্পন্ন</span></>}
        </div>
      </div>
      <div className="fld"><label>স্বাক্ষর (৩০০×৮০ px) <span className="req">*</span></label>
        <div className={`uz ${sg?"ok":""}`} style={{minHeight:160}}><input type="file" accept="image/*" onChange={e=>e.target.files[0]&&hs(e.target.files[0])} disabled={proc} />
          {proc?<><div className="ui">⏳</div><div className="ul">ব্যাকগ্রাউন্ড রিমুভ হচ্ছে...</div></>:!sg?<><div className="ui">✍️</div><div className="ul">স্বাক্ষরের ছবি আপলোড</div><div className="us">ব্যাকগ্রাউন্ড স্বয়ংক্রিয় রিমুভ হবে • ৩০০×৮০ px</div></>:<><div className="up" style={{background:"repeating-conic-gradient(#555 0% 25%,#333 0% 50%) 0 0/10px 10px",borderRadius:4,padding:4}}><img src={sg} alt="s" style={{height:50,objectFit:"contain"}}/></div><span className="ub">✓ স্বাক্ষর সম্পন্ন</span></>}
        </div>
      </div>
    </div>
    <div className="btn-row" style={{marginTop:20}}>
      <button className="btn btn-s" style={{padding:"12px 20px"}} onClick={onBack}>← পূর্ববর্তী</button>
      <button className="btn btn-p" onClick={()=>can&&onComplete({...pd,nid,doc,ph,sg})} style={{opacity:can?1:.6}}>রেজিস্ট্রেশন সম্পন্ন করুন ✓</button>
    </div>
    {!can&&<p style={{color:"var(--d)",fontSize:12,marginTop:8,textAlign:"center"}}>সকল ডকুমেন্ট আপলোড করুন</p>}
    </div>
  </div></div>;
}

function Success({data,onDash}) {
  const rid="BD-"+Math.floor(100000+Math.random()*900000);
  return <div className="page"><div className="card" style={{maxWidth:460}}><div className="card-body" style={{textAlign:"center",padding:36}}>
    <div className="sic">🎉</div>
    <h2 className="stl">রেজিস্ট্রেশন সফল!</h2>
    <p className="ss">আপনার রেজিস্ট্রেশন সফলভাবে সম্পন্ন হয়েছে।</p>
    <div className="rid"><div className="rl">আপনার রেজিস্ট্রেশন আইডি</div><div className="rv">{rid}</div></div>
    <p style={{fontSize:13,color:"var(--m)",marginBottom:20}}>এই আইডিটি সংরক্ষণ করুন।</p>
    <button className="btn btn-p" onClick={()=>onDash(rid)}>ড্যাশবোর্ডে যান →</button>
  </div></div></div>;
}

const SCH=[
  {day:"১৫",month:"মার্চ",title:"বাংলা ব্যাকরণ ও রচনা",time:"সকাল ৯:০০ – ১১:০০",tag:"বাংলা"},
  {day:"১৭",month:"মার্চ",title:"সাধারণ গণিত",time:"দুপুর ২:০০ – ৪:০০",tag:"গণিত"},
  {day:"১৯",month:"মার্চ",title:"সাধারণ জ্ঞান ও বাংলাদেশ বিষয়াবলি",time:"সকাল ১০:০০ – ১২:০০",tag:"সাধারণ জ্ঞান"},
  {day:"২২",month:"মার্চ",title:"ইংরেজি ভাষা ও সাহিত্য",time:"বিকাল ৩:০০ – ৫:০০",tag:"ইংরেজি"},
];

function Dash({user,rid,data}) {
  const [tab,setTab]=useState(0);
  const [books,setBooks]=useState([{n:"সিভিল সার্ভিস হ্যান্ডবুক ২০২৪",s:"৪.২ MB",d:"০১ মার্চ ২০২৫"},{n:"বাংলাদেশ বিষয়াবলি – সম্পূর্ণ গাইড",s:"৬.৮ MB",d:"১৫ ফেব্রুয়ারি ২০২৫"}]);
  const [bf,setBf]=useState(null);const [sf,setSf]=useState(null);
  const tabs=["👤 প্রোফাইল","📚 অকুপেশন ও সিলেবাস","📅 ক্লাস শিডিউল"];
  return <div style={{flex:1,background:"var(--bg)"}}><div className="dash">
    <div className="dw">
      <div className="av">{data?.ph?<img src={data.ph} alt="av"/>:user?.charAt(0)?.toUpperCase()}</div>
      <div className="wt"><h3>স্বাগতম, {data?.nameBn||user}!</h3><p>রেজিস্ট্রেশন আইডি: {rid} • {data?.education||"প্রার্থী"}</p></div>
      <div className="wb">✅ যাচাইকৃত</div>
    </div>
    <div className="ntabs">{tabs.map((t,i)=><button key={i} className={`ntab ${tab===i?"on":""}`} onClick={()=>setTab(i)}>{t}</button>)}</div>

    {tab===0&&<div className="tp">
      <div className="st">🪪 ব্যক্তিগত তথ্য</div>
      <div className="pg">
        {[["নাম (বাংলা)",data?.nameBn],["Name (English)",data?.nameEn],["পিতার নাম",data?.fatherBn],["Father's Name",data?.fatherEn],["মাতার নাম",data?.motherBn],["Mother's Name",data?.motherEn],["জন্ম তারিখ",data?.dob],["মোবাইল",data?.mobile],["ইমেইল",data?.email],["শিক্ষাগত যোগ্যতা",data?.education],["বিভাগ",data?.division],["জেলা",data?.district],["উপজেলা",data?.upazila]].map(([l,v],i)=><div key={i} className="pi"><div className="pil">{l}</div><div className="piv">{v||"—"}</div></div>)}
        <div className="pi" style={{gridColumn:"1/-1"}}><div className="pil">পূর্ণ ঠিকানা</div><div className="piv">{data?.address||"—"}</div></div>
      </div>
      <div className="pph">
        {[["ছবি",data?.ph,"🖼️"],["স্বাক্ষর",data?.sg,"✍️"],["NID",data?.nid,"🪪"]].map(([l,src,ic],i)=><div key={i} className="pb"><div className="pbl">{l}</div>{src?<img src={src} alt={l}/>:<div className="pbe">{ic}</div>}</div>)}
      </div>
    </div>}

    {tab===1&&<div className="tp">
      <div className="st">🏛️ অকুপেশন</div>
      <div className="oc"><div style={{fontSize:32}}>⚖️</div><div className="oi"><h4>সিভিল সার্ভিস (BCS)</h4><p>Bangladesh Civil Service — General Cadre</p></div><span style={{background:"rgba(63,185,80,.1)",border:"1px solid var(--ok)",color:"var(--ok)",borderRadius:6,padding:"4px 10px",fontSize:12}}>সক্রিয়</span></div>
      <div className="st" style={{marginTop:24}}>📖 আপলোড করা বই / সিলেবাস</div>
      {books.map((b,i)=><div key={i} className="oc"><div style={{fontSize:32}}>📗</div><div className="oi"><h4>{b.n}</h4><p>{b.s} • আপলোড: {b.d}</p></div><button className="ob">⬇ ডাউনলোড</button></div>)}
      <div className={`uz ${bf?"ok":""}`} style={{marginTop:12}}><input type="file" accept=".pdf,.doc,.docx" onChange={e=>{if(e.target.files[0]){setBf(e.target.files[0]);setBooks(p=>[...p,{n:e.target.files[0].name,s:(e.target.files[0].size/1024/1024).toFixed(1)+" MB",d:"আজকে"}]);}}} />
        {!bf?<><div className="ui">📤</div><div className="ul">নতুন বই / সিলেবাস আপলোড করুন</div><div className="us">PDF, DOC, DOCX গ্রহণযোগ্য</div></>:<><div style={{fontSize:36}}>✅</div><span className="ub">✓ আপলোড হয়েছে</span></>}
      </div>
    </div>}

    {tab===2&&<div className="tp">
      <div className="st">📅 আসন্ন ক্লাস শিডিউল</div>
      <div className="sc">
        {SCH.map((x,i)=><div key={i} className="sci"><div className="sd"><div className="dy">{x.day}</div><div className="mn">{x.month}</div></div><div className="sif"><div className="sit">{x.title}</div><div className="stm">🕐 {x.time}</div></div><div className="sbg">{x.tag}</div></div>)}
      </div>
      <div style={{marginTop:20}}>
        <div className="st">📤 নতুন শিডিউল আপলোড</div>
        <div className={`uz ${sf?"ok":""}`}><input type="file" accept=".pdf,.doc,.docx,image/*" onChange={e=>e.target.files[0]&&setSf(e.target.files[0])} />
          {!sf?<><div className="ui">📋</div><div className="ul">ক্লাস শিডিউল আপলোড করুন</div><div className="us">PDF, DOC, Image গ্রহণযোগ্য</div></>:<><div style={{fontSize:36}}>✅</div><span className="ub">✓ {sf.name} আপলোড হয়েছে</span></>}
        </div>
      </div>
    </div>}
  </div></div>;
}

function App() {
  const [sc,setSc]=useState("login");const [user,setUser]=useState(null);
  const [s1,setS1]=useState(null);const [data,setData]=useState(null);const [rid,setRid]=useState(null);
  return <>
    <style>{CSS}</style>
    <div className="app">
      <div className="hdr">
        <div className="hdr-logo">প</div>
        <div className="hdr-title"><h1>প্রার্থী নিবন্ধন পোর্টাল</h1><p>Candidate Registration Portal</p></div>
        {user&&<div className="hdr-badge">👤 {user}{sc==="dashboard"&&<span onClick={()=>{setSc("login");setUser(null);setData(null);setRid(null);}} style={{cursor:"pointer",color:"var(--d)"}}>লগআউট</span>}</div>}
      </div>
      {sc==="login"&&<Login onLogin={u=>{setUser(u);setSc("reg1");}}/>}
      {sc==="reg1"&&<Step1 onNext={d=>{setS1(d);setSc("reg2");}}/>}
      {sc==="reg2"&&<Step2 pd={s1} onComplete={d=>{setData(d);setSc("success");}} onBack={()=>setSc("reg1")}/>}
      {sc==="success"&&<Success data={data} onDash={id=>{setRid(id);setSc("dashboard");}}/>}
      {sc==="dashboard"&&<Dash user={user} rid={rid} data={data}/>}
    </div>
  </>;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
